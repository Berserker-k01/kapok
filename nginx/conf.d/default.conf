# ============================================
# Nginx — Assimε Platform
# SSL + Reverse proxy vers Node.js
# ============================================

# ==========================================
# Serveur HTTP (port 80) — Redirection HTTPS + Certbot
# ==========================================
server {
    listen 80;
    server_name assime.net www.assime.net *.assime.net;

    # Certbot webroot (Challenge pour Let's Encrypt / renouvellement)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# Serveur HTTPS (port 443) — Configuration principale
# ==========================================
server {
    listen 443 ssl http2;
    server_name assime.net www.assime.net *.assime.net;

    # ── Certificats SSL Let's Encrypt ──
    ssl_certificate /etc/letsencrypt/live/assime.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assime.net/privkey.pem;

    # ── Paramètres SSL recommandés ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS — Force HTTPS pendant 1 an
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================
    # Fichiers uploadés (images, preuves)
    # Servis directement par Nginx pour performance
    # ==========================================
    location /api/uploads/ {
        alias /app/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    location /uploads/ {
        alias /app/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # ==========================================
    # API Backend — Proxy vers Node.js
    # ==========================================
    location /api/ {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Taille max des uploads
        client_max_body_size 20M;
    }

    # ==========================================
    # Admin Panel — Proxy vers Node.js
    # (servi par Express depuis /admin)
    # ==========================================
    location /admin {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # User Panel — Proxy vers Node.js (catch-all)
    # (servi par Express depuis /)
    # ==========================================
    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
